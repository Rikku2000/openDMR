<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>openDMR</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="monitor">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-wrap">
          <button id="theme" class="brand-btn" type="button" aria-label="Toggle theme">
            <span class="brand-mark">DMR</span>
            <span>
              <strong>openDMR</strong>
              <small>Digital Mobile Radio</small>
            </span>
          </button>
        </div>

        <nav class="top-actions" aria-label="Primary navigation">
          <button onclick="location.href='index.html';" class="nav-btn" type="button">Dashboard</button>
          <button onclick="location.href='monitor.html';" class="nav-btn is-current" type="button">Monitor</button>
          <button onclick="location.href='register.html';" class="nav-btn is-hidden" data-auth-only type="button">Register</button>
        </nav>
      </header>

      <main class="page">
        <section class="hero-card">
          <div>
            <h1>Modern network overview for active calls, talkgroups, and system health.</h1>
            <p class="hero-copy">
              
            </p>
            <div class="hero-chips">
              <span class="chip" id="hero-status">Waiting for live data</span>
              <span class="chip chip-soft" id="hero-summary">No active transmissions yet</span>
              <span class="chip" id="monitor-status">Connecting</span>
              <span class="chip chip-soft" id="monitor-updated">Waiting for data</span>
            </div>
          </div>

          <div class="hero-side">
            <div class="clock-card">
              <div class="clock-label">Local time</div>
              <div class="clock-value" id="clock-time">--:--:--</div>
              <div class="clock-date" id="clock-date">Loading date</div>
            </div>
            <div class="pulse-card">
              <div class="pulse-dot"></div>
              <div>
                <div class="pulse-title">Auto refresh</div>
                <div class="pulse-sub">Every 3 seconds</div>
              </div>
            </div>
          </div>
        </section>

        <section class="monitor-grid">
          <article class="panel-card monitor-stat-card">
            <div class="panel-head">
              <div>
                <div class="panel-title">Server Monitor</div>
                <div class="panel-subtitle">Direct output from <code>/api/stat</code></div>
              </div>
              <div class="panel-meta" id="stat-meta">No reply yet</div>
            </div>
            <pre id="stat" class="terminal">Waiting for /STAT reply…</pre>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
