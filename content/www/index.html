<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>openDMR</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header class="header">
			<button id="theme" class="btn"><h1>openDMR</h1></button>
			<div class="actions">
				<button onclick="location.href='index.html';" class="btn">Dashboard</button>
				<button onclick="location.href='monitor.html';" class="btn">Monitor</button>
			</div>
		</header>

		<main class="container">
			<section class="card">
				<div class="card-head">
					<h3>Currently Active</h3>
				</div>
				<div class="table-wrap">
					<table class="table" id="tab-active" aria-label="Active calls">
						<thead>
							<tr>
								<th style="width: 25%;">Date</th>
								<th style="width: 20%;">Radio</th>
								<th style="width: 5%;">Badges</th>
								<th style="width: 15%;">TG</th>
								<th style="width: 10%;">Slot</th>
								<th style="width: 15%;">Node</th>
								<th style="width: 10%;">Secs</th>
							</tr>
						</thead>
						<tbody>
						</tbody>
					</table>
				</div>
			</section>

			<section class="card">
				<div class="card-head">
					<h3>Recent PTT / Talkgroups</h3>
				</div>
				<div class="table-wrap">
					<table class="table" id="tab-log" aria-label="Recent PTT">
						<thead>
							<tr>
								<th style="width: 5%;">ID</th>
								<th style="width: 20%;">Date</th>
								<th style="width: 15%;">Radio</th>
								<th style="width: 5%;">Badges</th>
								<th style="width: 15%;">TG</th>
								<th style="width: 5%;">Slot</th>
								<th style="width: 15%;">Node</th>
								<th style="width: 10%;">Secs</th>
								<th style="width: 5%;">Active</th>
								<th style="width: 5%;">Online</th>
								<th style="width: 5%;">Conn</th>
							</tr>
						</thead>
						<tbody>
						</tbody>
					</table>
				</div>
			</section>
		</main>

		<script type="module" src="app.js"></script>
	</body>
</html>
